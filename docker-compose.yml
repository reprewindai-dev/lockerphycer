version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lockerphycer-postgres
    environment:
      POSTGRES_DB: lockerphycer_production
      POSTGRES_USER: lockerphycer_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - lockerphycer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lockerphycer_user -d lockerphycer_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lockerphycer-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - ./infra/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    networks:
      - lockerphycer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Locker Phycer Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lockerphycer-api
    environment:
      # Database
      DATABASE_URL: postgresql://lockerphycer_user:${POSTGRES_PASSWORD}@postgres:5432/lockerphycer_production
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      
      # Application
      APP_NAME: "Locker Phycer"
      DEBUG: false
      SECRET_KEY: ${SECRET_KEY}
      AI_CITIZENSHIP_SECRET: ${AI_CITIZENSHIP_SECRET}
      
      # URLs
      FRONTEND_URL: ${FRONTEND_URL}
      API_URL: ${API_URL}
      
      # AI Providers
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      
      # Billing
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      
      # Monitoring
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD}
      
      # Security
      ENABLE_MFA: true
      PASSWORD_MIN_LENGTH: 8
      MAX_FAILED_LOGIN_ATTEMPTS: 10
      ACCOUNT_LOCKOUT_DURATION_MINUTES: 30
      
      # Performance
      MAX_CONCURRENT_REQUESTS: 100
      REQUEST_TIMEOUT_SECONDS: 30
      CACHE_TTL_SECONDS: 3600
      
      # AI/ML Configuration
      MODEL_CACHE_DIR: /app/models
      MAX_CONCURRENT_AI_REQUESTS: 10
      AI_REQUEST_TIMEOUT_SECONDS: 60
      
      # Logging
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      LOG_FILE_PATH: /app/logs/lockerphycer.log
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./static:/app/static
      - ./models:/app/models
    ports:
      - "8000:8000"
    networks:
      - lockerphycer-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lockerphycer-worker
    command: celery -A worker worker --loglevel=info --concurrency=4
    environment:
      # Same environment as API
      DATABASE_URL: postgresql://lockerphycer_user:${POSTGRES_PASSWORD}@postgres:5432/lockerphycer_production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      AI_CITIZENSHIP_SECRET: ${AI_CITIZENSHIP_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MODEL_CACHE_DIR: /app/models
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    networks:
      - lockerphycer-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  # Celery Beat (Scheduler)
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lockerphycer-beat
    command: celery -A worker beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://lockerphycer_user:${POSTGRES_PASSWORD}@postgres:5432/lockerphycer_production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - lockerphycer-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: lockerphycer-nginx
    volumes:
      - ./infra/docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infra/docker/nginx/ssl:/etc/nginx/ssl
      - ./static:/var/www/static
      - ./apps/web:/var/www/html
    ports:
      - "80:80"
      - "443:443"
    networks:
      - lockerphycer-network
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: lockerphycer-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - lockerphycer-network
    restart: unless-stopped

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: lockerphycer-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - lockerphycer-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Log Aggregation - Loki
  loki:
    image: grafana/loki:latest
    container_name: lockerphycer-loki
    command:
      - '-config.file=/etc/loki/local-config.yaml'
    volumes:
      - ./infra/docker/loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - lockerphycer-network
    restart: unless-stopped

  # Log Collection - Promtail
  promtail:
    image: grafana/promtail:latest
    container_name: lockerphycer-promtail
    command:
      - '-config.file=/etc/promtail/config.yml'
    volumes:
      - ./infra/docker/promtail/config.yml:/etc/promtail/config.yml
      - ./logs:/var/log/app
    networks:
      - lockerphycer-network
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  lockerphycer-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
