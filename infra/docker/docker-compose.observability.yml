# Observability stack — add to your main docker-compose with:
# docker compose -f docker-compose.yml -f infra/docker/docker-compose.observability.yml up
#
# Or deploy as a separate Coolify service pointing at this file.

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    environment:
      - PROMETHEUS_API_TOKEN=${PROMETHEUS_API_TOKEN}
    networks:
      - veklom

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./infra/docker/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - ./logs:/var/log/app:ro
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    environment:
      - GRAFANA_API_TOKEN=${GRAFANA_API_TOKEN}
    depends_on:
      - loki
    networks:
      - veklom

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./infra/docker/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - veklom

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./infra/docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    environment:
      - GRAFANA_API_TOKEN=${GRAFANA_API_TOKEN}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - RESEND_SMTP_KEY=${RESEND_SMTP_KEY}
    networks:
      - veklom

volumes:
  prometheus_data:
  loki_data:

networks:
  veklom:
    external: true
