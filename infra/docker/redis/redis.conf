# Redis configuration for Veklom / Lockerphycer
# Password is set via command line --requirepass in docker-compose

# Persistence
appendonly yes
appendfsync everysec

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Networking
bind 0.0.0.0
protected-mode yes
tcp-keepalive 300

# Logging
loglevel notice
