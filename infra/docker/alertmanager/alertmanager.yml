# Alertmanager — Grafana Cloud Canada East
# Alertmanager instance: alertmanager-prod-ca-east-0.grafana.net
# User: 1612824 | Password: ${GRAFANA_API_TOKEN}

global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK_URL}'

route:
  group_by: ['alertname', 'service', 'env']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    # Critical alerts — immediate Slack + email
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 1h
    # Warning alerts — Slack only
    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 4h
    # Scheduler/celery issues
    - match:
        job: celery-worker
      receiver: 'celery'
      repeat_interval: 2h

receivers:
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

  - name: 'critical'
    slack_configs:
      - channel: '#alerts-critical'
        title: '🚨 CRITICAL: {{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}*Description:* {{ .Annotations.description }}\n*Service:* {{ .Labels.service }}{{ end }}'
        send_resolved: true
    email_configs:
      - to: 'reprewindai@gmail.com'
        from: 'alerts@veklom.com'
        smarthost: 'smtp.resend.com:587'
        auth_username: 'resend'
        auth_password: '${RESEND_SMTP_KEY}'
        subject: '🚨 CRITICAL Alert: {{ .CommonLabels.alertname }}'
        send_resolved: true

  - name: 'warning'
    slack_configs:
      - channel: '#alerts'
        title: '⚠️ WARNING: {{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

  - name: 'celery'
    slack_configs:
      - channel: '#alerts'
        title: '⚙️ Celery Issue: {{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
