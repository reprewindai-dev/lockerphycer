# Prometheus — scrapes local metrics and remote_writes to Grafana Cloud (Canada East)
# PROMETHEUS_API_TOKEN env var = your Grafana.com API Token

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production
    service: veklom-lockerphycer
    region: ca-east

# Remote write to Grafana Cloud Prometheus (Mimir) — Canada East
remote_write:
  - url: https://prometheus-prod-32-prod-ca-east-0.grafana.net/api/prom/push
    basic_auth:
      username: "3229768"
      password: ${PROMETHEUS_API_TOKEN}
    queue_config:
      max_samples_per_send: 1000
      max_shards: 200
      capacity: 2500

scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Veklom FastAPI app (via prometheus-client)
  - job_name: veklom-api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
    labels:
      service: lockerphycer-api

  # Celery worker metrics (if flower is running)
  - job_name: celery-worker
    static_configs:
      - targets: ['worker:8001']
    labels:
      service: celery-worker
