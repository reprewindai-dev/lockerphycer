# Prometheus Alert Rules — Veklom / Lockerphycer
# Upload with: mimirtool rules load infra/alerts/rules.yml
# Endpoint: https://prometheus-prod-32-prod-ca-east-0.grafana.net

groups:

  - name: api.rules
    interval: 30s
    rules:
      - alert: APIDown
        expr: up{job="veklom-api"} == 0
        for: 2m
        labels:
          severity: critical
          service: lockerphycer-api
        annotations:
          summary: "Veklom API is down"
          description: "The Veklom FastAPI service has been unreachable for more than 2 minutes."

      - alert: APIHighErrorRate
        expr: rate(http_requests_total{job="veklom-api",status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: lockerphycer-api
        annotations:
          summary: "High 5xx error rate on API"
          description: "More than 5% of API requests are returning 5xx errors over the last 5 minutes."

      - alert: APIHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="veklom-api"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: lockerphycer-api
        annotations:
          summary: "API p95 latency above 2s"
          description: "95th percentile API response time has exceeded 2 seconds for 5 minutes."

  - name: celery.rules
    interval: 60s
    rules:
      - alert: CeleryWorkerDown
        expr: up{job="celery-worker"} == 0
        for: 3m
        labels:
          severity: critical
          service: celery-worker
        annotations:
          summary: "Celery worker is down"
          description: "No Celery worker has been reachable for 3 minutes. Scheduled jobs will not run."

      - alert: CeleryQueueBacklog
        expr: celery_queue_length > 100
        for: 10m
        labels:
          severity: warning
          service: celery-worker
        annotations:
          summary: "Celery queue backlog building up"
          description: "Celery queue has more than 100 tasks pending for 10 minutes. Workers may be stuck."

      - alert: ScheduledJobSkipped
        expr: increase(celery_beat_skipped_tasks_total[15m]) > 50
        for: 5m
        labels:
          severity: warning
          service: celery-beat
        annotations:
          summary: "High number of skipped scheduled jobs"
          description: "More than 50 scheduled tasks were skipped in 15 minutes — likely a lock conflict or beat crash."

  - name: redis.rules
    interval: 30s
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down"
          description: "Redis has been unreachable for 2 minutes. Celery and caching are broken."

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis memory above 85%"
          description: "Redis is using more than 85% of its max memory. Risk of eviction."

  - name: postgres.rules
    interval: 30s
    rules:
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL has been unreachable for 2 minutes. All database operations are failing."

      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "High number of Postgres connections"
          description: "PostgreSQL has more than 80 active connections for 5 minutes."

  - name: host.rules
    interval: 60s
    rules:
      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
          service: host
        annotations:
          summary: "Host CPU above 85%"
          description: "Server CPU usage on {{ $labels.instance }} has been above 85% for 10 minutes."

      - alert: HighDiskUsage
        expr: (node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          service: host
        annotations:
          summary: "Disk usage above 85%"
          description: "Disk on {{ $labels.instance }} ({{ $labels.mountpoint }}) is over 85% full."

      - alert: DiskCritical
        expr: (node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes > 0.95
        for: 2m
        labels:
          severity: critical
          service: host
        annotations:
          summary: "Disk usage CRITICAL — above 95%"
          description: "Disk on {{ $labels.instance }} is over 95% full. Immediate action required."
